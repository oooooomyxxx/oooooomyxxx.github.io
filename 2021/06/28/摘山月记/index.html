<li><p>我深怕自己并非美玉，故而不敢加以刻苦折磨，却又半信自己是块美玉，故又不肯庸庸碌碌，与瓦砾为伍。于是我渐渐地脱离凡尘，疏远世人，结果便是一任愤懑与羞恨日益助长内心那怯弱地自尊心。</p>
</li>
<li><p>无非是害怕暴露自己才华不足之卑劣的恐惧和不肯刻苦用功的无耻之怠惰而已……</p>
</li>
</ul>
